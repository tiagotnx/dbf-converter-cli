version: 2

project_name: dbf-converter

before:
  hooks:
    - go mod tidy

builds:
  - id: dbf-converter
    main: .
    binary: dbf-converter
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - id: dbf-converter
    ids:
      - dbf-converter
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macos
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: '{{ incpatch .Version }}-next'

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\(.+\))??!?:.+$'
      order: 2
    - title: Others
      order: 999

release:
  github:
    owner: tiagotnx
    name: dbf-converter-cli
  draft: false
  prerelease: auto
  name_template: '{{ .ProjectName }} v{{ .Version }}'

dockers:
  - image_templates:
      - 'ghcr.io/tiagotnx/dbf-converter:{{ .Version }}'
      - 'ghcr.io/tiagotnx/dbf-converter:latest'
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - '--platform=linux/amd64'
      - '--label=org.opencontainers.image.title={{ .ProjectName }}'
      - '--label=org.opencontainers.image.version={{ .Version }}'
      - '--label=org.opencontainers.image.revision={{ .FullCommit }}'
      - '--label=org.opencontainers.image.source=https://github.com/tiagotnx/dbf-converter-cli'
      - '--label=org.opencontainers.image.licenses=MIT'
    skip_push: auto

brews:
  - name: dbf-converter
    ids:
      - dbf-converter
    repository:
      owner: tiagotnx
      name: homebrew-tap
    directory: Formula
    homepage: 'https://github.com/tiagotnx/dbf-converter-cli'
    description: 'Streaming converter for legacy dBase .dbf files into CSV/JSONL/SQL/Parquet.'
    license: 'MIT'
    test: |
      system "#{bin}/dbf-converter", "--version"
    install: |
      bin.install "dbf-converter"

scoops:
  - name: dbf-converter
    ids:
      - dbf-converter
    repository:
      owner: tiagotnx
      name: scoop-bucket
    homepage: 'https://github.com/tiagotnx/dbf-converter-cli'
    description: 'Streaming converter for legacy dBase .dbf files into CSV/JSONL/SQL/Parquet.'
    license: 'MIT'
