version: 2

project_name: dbf-converter

before:
  hooks:
    - go mod tidy

builds:
  - id: dbf-converter
    main: .
    binary: dbf-converter
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - id: dbf-converter
    ids:
      - dbf-converter
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macos
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: '{{ incpatch .Version }}-next'

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\(.+\))??!?:.+$'
      order: 2
    - title: Others
      order: 999

release:
  github:
    owner: tiagotnx
    name: dbf-converter-cli
  draft: false
  prerelease: auto
  name_template: '{{ .ProjectName }} v{{ .Version }}'

# Optional distribution channels — enable once the prerequisite repos exist.
#
#   * Docker (ghcr.io/tiagotnx/dbf-converter): needs Dockerfile.release that
#     copies the prebuilt binary instead of recompiling from source.
#   * Homebrew tap: needs the repo tiagotnx/homebrew-tap to be created.
#   * Scoop bucket: needs the repo tiagotnx/scoop-bucket to be created.
#
# See https://goreleaser.com/customization/docker/, /homebrew_casks/, /scoop/.
